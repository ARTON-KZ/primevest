<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — PrimeVest</title>
  <meta name="theme-color" content="#050b16" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <div class="auth">
    <aside class="auth-aside">
      <div class="auth-aside-glow" aria-hidden="true"></div>
      <a class="brand" href="/">Prime<span>Vest</span></a>
      <div class="auth-aside-body">
        <h2>Welcome <em>back</em>.</h2>
        <p>Log in to check your balance, make a deposit, or request a withdrawal.</p>
        <div class="auth-aside-card">
          <div class="label">Your portfolio is</div>
          <div class="val mono">always working</div>
          <div class="sub">▲ compounding 24/7</div>
        </div>
      </div>
      <p class="auth-aside-foot">Bank-grade custody · BTC · ETH · USDT</p>
    </aside>

    <main class="auth-main">
      <div class="auth-form-wrap">
        <div class="brand-mobile"><a class="brand" href="/">Prime<span>Vest</span></a></div>
        <div class="auth-head">
          <h1>Log in</h1>
          <p>New to PrimeVest? <a href="register.html">Create an account</a></p>
        </div>

        <div id="formError" class="auth-error hidden"></div>

        <form id="loginForm" novalidate>
          <div class="field">
            <label for="email">Email address</label>
            <input class="input" id="email" name="email" type="email" placeholder="you@email.com" autocomplete="email" required />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input class="input" id="password" name="password" type="password" placeholder="Your password" autocomplete="current-password" required />
          </div>
          <button class="btn btn-primary btn-block btn-lg" id="submitBtn" type="submit">Log in</button>
        </form>
      </div>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
</body>
</html>
